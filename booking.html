<!DOCTYPE html>
<html>
<head>
    <title>Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">

        <h2>Book Your Car</h2>

        <input type="text" placeholder="Enter Your Name">

        <label>Pickup Date</label>
        <input type="date">

        <label>Return Date</label>
        <input type="date">

        <select>
            <option>Cash</option>
            <option>UPI</option>
            <option>Credit Card</option>
        </select>

        <button onclick="showMessage()">Confirm Booking</button>

        <p id="message"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
